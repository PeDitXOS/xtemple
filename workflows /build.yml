name: Compile OpenWrt Themes and Apps (IPK & APK)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    name: Compile Packages
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - { name: 'luci-theme-peditx', url: 'https://github.com/peditx/luci-theme-peditx' }
          - { name: 'luci-theme-carbonpx', url: 'https://github.com/peditx/luci-theme-carbonpx' }
          - { name: 'luci-app-themeswitch', url: 'https://github.com/peditx/luci-app-themeswitch' }

    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          path: 'target_repo'

      - name: Checkout Source Project
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.project.url }}
          path: 'src_project'

      - name: Extract Project Version
        id: get_version
        run: |
          # Extract version from Makefile (PKG_VERSION:=X.Y.Z)
          VERSION=$(grep 'PKG_VERSION:=' src_project/Makefile | cut -d'=' -f2 | tr -d ' \n\r')
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project Version discovered: $VERSION"

      # --- IPK Compilation (OpenWrt 24.10 & older) ---
      - name: Initialization Environment for IPK
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gawk gettext git libncurses5-dev libssl-dev rsync zlib1g-dev swig unzip wget

      - name: Download OpenWrt SDK for IPK (24.10 Example)
        run: |
          # Downloading a generic x86_64 SDK for LuCI compilation (Architecture independent for themes)
          wget https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk_ipk

      - name: Compile IPK Package
        run: |
          cd sdk_ipk
          # Add the project to SDK feeds/package
          mkdir -p package/${{ matrix.project.name }}
          cp -r ../src_project/* package/${{ matrix.project.name }}/
          
          # Update and install feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Configure and Compile
          make defconfig
          make package/${{ matrix.project.name }}/compile V=s

      # --- APK Compilation (OpenWrt 25.12 & newer) ---
      # Note: 25.12 leverages the Alpine-based APK packaging tools provided by OpenWrt's new SDK structure.
      - name: Download OpenWrt SDK for APK (25.12 Example)
        run: |
          # Downloading the newer snapshot/25.12 SDK that supports APK packaging
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-15.1.0_musl.Linux-x86_64.tar.xz || \
          wget https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-15.1.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          # Distinguish from the IPK SDK
          mv openwrt-sdk-* sdk_apk

      - name: Compile APK Package
        run: |
          cd sdk_apk
          mkdir -p package/${{ matrix.project.name }}
          cp -r ../src_project/* package/${{ matrix.project.name }}/
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          make defconfig
          # Using the new APK build target config if specified, otherwise compile standard
          make package/${{ matrix.project.name }}/compile V=s

      # --- Organize Outputs into Target Directories ---
      - name: Organize Binaries
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TARGET_DIR="target_repo/${{ matrix.project.name }}/$VERSION"
          
          mkdir -p "$TARGET_DIR/ipk"
          mkdir -p "$TARGET_DIR/apk"
          
          # Copy IPKs (Look into the built bin folder)
          find sdk_ipk/bin/ -name "*.ipk" -exec cp {} "$TARGET_DIR/ipk/" \; 2>/dev/null || true
          
          # Copy APKs (Look into the built bin folder for .apk packages)
          find sdk_apk/bin/ -name "*.apk" -exec cp {} "$TARGET_DIR/apk/" \; 2>/dev/null || true

      # --- Commit and Push Changes to Target Repository ---
      - name: Deploy to Target Repository
        run: |
          cd target_repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          # Only commit if there are changes to avoid workflow failure
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated build: ${{ matrix.project.name }} v${{ steps.get_version.outputs.version }}"
            git push origin main
          else
            echo "No changes detected. Skipping commit."
          fi
