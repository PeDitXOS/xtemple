name: Compile & Release OpenWrt Themes/Apps (Multi-Arch)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    branches:
      - main

permissions:
  contents: write

env:
  TZ: Asia/Tehran
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64_generic
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_cortex-a15_neon-vfpv4
          - mips_24kc
          - mips_4kec
          - mips_mips32
          - mipsel_24kc
          - mipsel_74kc
          - mipsel_mips32

    steps:
      - name: Clone Source Projects
        run: |
          mkdir -p src_projects
          git clone https://github.com/peditx/luci-theme-peditx.git src_projects/luci-theme-peditx
          git clone https://github.com/peditx/luci-theme-carbonpx.git src_projects/luci-theme-carbonpx
          git clone https://github.com/peditx/luci-app-themeswitch.git src_projects/luci-app-themeswitch

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext unzip zlib1g-dev file python3 python3-venv curl wget zstd

      # ================= IPK BUILD (SDK 23.05) =================
      - name: Setup & Build IPK
        id: build_ipk
        run: |
          SDK_URL="http://downloads.openwrt.org/releases/23.05.0/targets/${{ matrix.arch }}/generic/openwrt-sdk-23.05.0-${{ matrix.arch }}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          if ! wget -q --spider "$SDK_URL"; then
            echo "⚠️ IPK SDK not found for ${{ matrix.arch }}"
            exit 0
          fi
          wget "$SDK_URL" -O sdk.tar.xz
          mkdir sdk && tar -xJf sdk.tar.xz -C sdk --strip-components=1
          cd sdk
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          projects=("luci-theme-peditx" "luci-theme-carbonpx" "luci-app-themeswitch")
          for proj in "${projects[@]}"; do
            mkdir -p package/$proj
            cp -r ../src_projects/$proj/* package/$proj/
            echo -e "CONFIG_PACKAGE_$proj=m\nCONFIG_LUCI_JSMIN=n\nCONFIG_LUCI_CSSTIDY=n" >> .config
          done
          make defconfig
          for proj in "${projects[@]}"; do
            make package/$proj/compile -j$(nproc) V=s || true
          done
          
          # Collect artifacts
          mkdir -p ../artifacts/ipk
          find bin/ -type f -name "*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true
          echo "has_ipk=true" >> $GITHUB_OUTPUT

      # ================= APK BUILD (SDK 25.12) =================
      - name: Setup & Build APK
        id: build_apk
        run: |
          SDK_URL="http://downloads.openwrt.org/releases/25.12.0/targets/${{ matrix.arch }}/generic/openwrt-sdk-25.12.0-${{ matrix.arch }}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          if ! wget -q --spider "$SDK_URL"; then
            echo "⚠️ APK SDK not found for ${{ matrix.arch }}"
            exit 0
          fi
          wget "$SDK_URL" -O sdk.tar.zst
          zstd -d sdk.tar.zst && tar -xf sdk.tar -C sdk --strip-components=1
          cd sdk
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          projects=("luci-theme-peditx" "luci-theme-carbonpx" "luci-app-themeswitch")
          for proj in "${projects[@]}"; do
            mkdir -p package/$proj
            cp -r ../src_projects/$proj/* package/$proj/
            echo -e "CONFIG_PACKAGE_$proj=m\nCONFIG_LUCI_JSMIN=n\nCONFIG_LUCI_CSSTIDY=n" >> .config
          done
          make defconfig
          for proj in "${projects[@]}"; do
            make package/$proj/compile -j$(nproc) V=s || true
          done
          
          # Collect artifacts
          mkdir -p ../artifacts/apk
          find bin/ -type f -name "*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true
          echo "has_apk=true" >> $GITHUB_OUTPUT

      # ================= UPLOAD TO RELEASE =================
      - name: Upload All Assets to Single Release
        uses: softprops/action-gh-release@v2
        if: ${{ hashFiles('artifacts/**') != '' }}
        with:
          tag_name: ${{ github.event.inputs.version || 'v1.0.0' }}
          name: "PeDitX Packages ${{ github.event.inputs.version || 'v1.0.0' }}"
          files: artifacts/**/*
          append_body: true
          body: "✅ Built for `${{ matrix.arch }}`"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
