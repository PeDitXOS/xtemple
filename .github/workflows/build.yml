name: Compile OpenWrt Themes and Apps (IPK & APK)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Compile Packages
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - { name: 'luci-theme-peditx', slug: 'peditx/luci-theme-peditx' }
          - { name: 'luci-theme-carbonpx', slug: 'peditx/luci-theme-carbonpx' }
          - { name: 'luci-app-themeswitch', slug: 'peditx/luci-app-themeswitch' }

    steps:
      - name: Checkout Target Repository (Where builds will be saved)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: 'target_repo'

      - name: Checkout Source Project
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.project.slug }}
          path: 'src_project'

      - name: Extract Project Version
        id: get_version
        run: |
          # Robust version extraction from Makefile
          VERSION=$(grep -E 'PKG_VERSION\s*:=\s*' src_project/Makefile | sed -E 's/PKG_VERSION\s*:=\s*//' | tr -d ' \n\r')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project Version discovered: $VERSION"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext unzip zlib1g-dev file python3 python3-venv curl wget zstd

      # --- IPK Build Environment (OpenWrt <= 24.10 using stable 23.05 SDK) ---
      - name: Setup OpenWrt 23.05 SDK (for IPK)
        run: |
          wget https://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          mkdir sdk_ipk && tar -xJf openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -C sdk_ipk --strip-components=1
          cd sdk_ipk
          echo "src-git packages https://github.com/openwrt/packages.git" > feeds.conf.default
          echo "src-git luci https://github.com/openwrt/luci.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build IPK Package
        run: |
          cd sdk_ipk
          # Clone/Copy source inside the package directory
          mkdir -p package/${{ matrix.project.name }}
          cp -r ../src_project/* package/${{ matrix.project.name }}/
          
          # Inject configuration settings to disable Javascript/CSS compression
          echo "CONFIG_PACKAGE_${{ matrix.project.name }}=m" >> .config
          echo "CONFIG_LUCI_JSMIN=n" >> .config
          echo "CONFIG_LUCI_CSSTIDY=n" >> .config
          
          make defconfig
          make package/${{ matrix.project.name }}/compile -j$(nproc) V=s

      # --- APK Build Environment (OpenWrt >= 25.12 using stable 25.12.0 SDK) ---
      - name: Setup OpenWrt 25.12 SDK (for APK)
        run: |
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          zstd -d openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mkdir sdk_apk && tar -xf openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar -C sdk_apk --strip-components=1
          cd sdk_apk
          echo "src-git packages https://github.com/openwrt/packages.git" > feeds.conf.default
          echo "src-git luci https://github.com/openwrt/luci.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build APK Package
        run: |
          cd sdk_apk
          mkdir -p package/${{ matrix.project.name }}
          cp -r ../src_project/* package/${{ matrix.project.name }}/
          
          # Inject configuration settings to disable Javascript/CSS compression
          echo "CONFIG_PACKAGE_${{ matrix.project.name }}=m" >> .config
          echo "CONFIG_LUCI_JSMIN=n" >> .config
          echo "CONFIG_LUCI_CSSTIDY=n" >> .config
          
          make defconfig
          make package/${{ matrix.project.name }}/compile -j$(nproc) V=s

      # --- Organize and Structure Output Folders ---
      - name: Organize Binaries
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TARGET_DIR="target_repo/${{ matrix.project.name }}/v$VERSION"
          
          mkdir -p "$TARGET_DIR/ipk"
          mkdir -p "$TARGET_DIR/apk"
          
          # Copy IPK artifacts
          find sdk_ipk/bin/ -name "*${{ matrix.project.name }}*.ipk" -exec cp {} "$TARGET_DIR/ipk/" \; 2>/dev/null || true
          
          # Copy APK artifacts
          find sdk_apk/bin/ -name "*${{ matrix.project.name }}*.apk" -exec cp {} "$TARGET_DIR/apk/" \; 2>/dev/null || true

      # --- Commit & Deploy to Target Repository ---
      - name: Deploy to Target Repository
        run: |
          cd target_repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated compile: ${{ matrix.project.name }} v${{ steps.get_version.outputs.version }}"
            git push origin main
          else
            echo "No changes to deploy. Skipping push."
          fi
