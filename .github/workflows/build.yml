name: Compile OpenWrt Themes and Apps (IPK & APK)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Compile Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Target Repository (Where builds will be saved)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: 'target_repo'

      - name: Clone Source Projects
        run: |
          mkdir -p src_projects
          git clone https://github.com/peditx/luci-theme-peditx.git src_projects/luci-theme-peditx
          git clone https://github.com/peditx/luci-theme-carbonpx.git src_projects/luci-theme-carbonpx
          git clone https://github.com/peditx/luci-app-themeswitch.git src_projects/luci-app-themeswitch

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext unzip zlib1g-dev file python3 python3-venv curl wget zstd

      # --- IPK Build Environment (OpenWrt <= 24.10 using stable 23.05 SDK) ---
      - name: Setup OpenWrt 23.05 SDK (for IPK)
        run: |
          wget https://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          mkdir sdk_ipk && tar -xJf openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -C sdk_ipk --strip-components=1
          cd sdk_ipk
          # Using built-in feed definitions ensuring correct matched branches
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build IPK Packages
        run: |
          cd sdk_ipk
          projects=("luci-theme-peditx" "luci-theme-carbonpx" "luci-app-themeswitch")
          
          for proj in "${projects[@]}"; do
            echo "==== Building IPK for $proj ===="
            mkdir -p package/$proj
            cp -r ../src_projects/$proj/* package/$proj/
            
            # Append local config variables to .config
            echo "CONFIG_PACKAGE_$proj=m" >> .config
            echo "CONFIG_LUCI_JSMIN=n" >> .config
            echo "CONFIG_LUCI_CSSTIDY=n" >> .config
          done
          
          make defconfig
          
          for proj in "${projects[@]}"; do
            make package/$proj/compile -j$(nproc) V=s || make package/$proj/compile V=sc
          done

      # --- APK Build Environment (OpenWrt >= 25.12 using stable 25.12.0 SDK) ---
      - name: Setup OpenWrt 25.12 SDK (for APK)
        run: |
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          zstd -d openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mkdir sdk_apk && tar -xf openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar -C sdk_apk --strip-components=1
          cd sdk_apk
          # Using built-in feed definitions ensuring correct matched branches
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build APK Packages
        run: |
          cd sdk_apk
          projects=("luci-theme-peditx" "luci-theme-carbonpx" "luci-app-themeswitch")
          
          for proj in "${projects[@]}"; do
            echo "==== Building APK for $proj ===="
            mkdir -p package/$proj
            cp -r ../src_projects/$proj/* package/$proj/
            
            # Append local config variables to .config
            echo "CONFIG_PACKAGE_$proj=m" >> .config
            echo "CONFIG_LUCI_JSMIN=n" >> .config
            echo "CONFIG_LUCI_CSSTIDY=n" >> .config
          done
          
          make defconfig
          
          for proj in "${projects[@]}"; do
            make package/$proj/compile -j$(nproc) V=s || make package/$proj/compile V=sc
          done

      # --- Organize and Structure Output Folders ---
      - name: Organize Binaries
        run: |
          projects=("luci-theme-peditx" "luci-theme-carbonpx" "luci-app-themeswitch")
          
          for proj in "${projects[@]}"; do
            VERSION=$(grep -E 'PKG_VERSION\s*:=\s*' src_projects/$proj/Makefile | sed -E 's/PKG_VERSION\s*:=\s*//' | tr -d ' \n\r')
            if [ -z "$VERSION" ]; then
              VERSION="1.0.0"
            fi
            
            TARGET_DIR="target_repo/$proj/v$VERSION"
            mkdir -p "$TARGET_DIR/ipk"
            mkdir -p "$TARGET_DIR/apk"
            
            # Copy matching packages from respective builds
            find sdk_ipk/bin/ -name "*$proj*.ipk" -exec cp {} "$TARGET_DIR/ipk/" \; 2>/dev/null || true
            find sdk_apk/bin/ -name "*$proj*.apk" -exec cp {} "$TARGET_DIR/apk/" \; 2>/dev/null || true
          done

      # --- Commit & Deploy to Target Repository ---
      - name: Deploy to Target Repository
        run: |
          cd target_repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated compile: All Packages"
            git push origin main
          else
            echo "No changes to deploy. Skipping push."
          fi
