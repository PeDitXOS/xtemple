name: Compile OpenWrt Themes and Apps (IPK & APK)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Compile Packages
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - { name: 'luci-theme-peditx', slug: 'peditx/luci-theme-peditx' }
          - { name: 'luci-theme-carbonpx', slug: 'peditx/luci-theme-carbonpx' }
          - { name: 'luci-app-themeswitch', slug: 'peditx/luci-app-themeswitch' }

    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: 'target_repo'

      - name: Checkout Source Project
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.project.slug }}
          path: 'src_project'

      - name: Extract Project Version
        id: get_version
        run: |
          VERSION=$(grep 'PKG_VERSION:=' src_project/Makefile | cut -d'=' -f2 | tr -d ' \n\r')
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project Version discovered: $VERSION"

      # --- Environment Setup ---
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gawk gettext git libncurses5-dev libssl-dev rsync zlib1g-dev swig unzip wget

      # --- IPK Compilation (OpenWrt 24.10) ---
      - name: Download OpenWrt SDK for IPK (24.10)
        run: |
          wget https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk_ipk

      - name: Compile IPK Package
        run: |
          cd sdk_ipk
          mkdir -p package/${{ matrix.project.name }}
          cp -r ../src_project/* package/${{ matrix.project.name }}/
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/${{ matrix.project.name }}/compile V=s

      # --- APK Compilation (OpenWrt 25.12) ---
      - name: Download OpenWrt SDK for APK (25.12 Snapshot)
        run: |
          wget https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-15.1.0_musl.Linux-x86_64.tar.xz || \
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-15.1.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk_apk

      - name: Compile APK Package
        run: |
          cd sdk_apk
          mkdir -p package/${{ matrix.project.name }}
          cp -r ../src_project/* package/${{ matrix.project.name }}/
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/${{ matrix.project.name }}/compile V=s

      # --- Organize Outputs into Target Directories ---
      - name: Organize Binaries
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TARGET_DIR="target_repo/${{ matrix.project.name }}/$VERSION"
          
          mkdir -p "$TARGET_DIR/ipk"
          mkdir -p "$TARGET_DIR/apk"
          
          find sdk_ipk/bin/ -name "*${{ matrix.project.name }}*.ipk" -exec cp {} "$TARGET_DIR/ipk/" \; 2>/dev/null || true
          find sdk_apk/bin/ -name "*${{ matrix.project.name }}*.apk" -exec cp {} "$TARGET_DIR/apk/" \; 2>/dev/null || true

      # --- Commit and Push Changes to Target Repository ---
      - name: Deploy to Target Repository
        run: |
          cd target_repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated build: ${{ matrix.project.name }} v${{ steps.get_version.outputs.version }}"
            git push origin main
          else
            echo "No changes detected. Skipping commit."
          fi
